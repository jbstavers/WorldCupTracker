<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Games · World Cup 2026</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <h1 id="masthead-title"></h1>
      <nav class="site-nav">
        <a href="index.html">Overview</a>
        <a href="today.html" class="active">Today's Games</a>
      </nav>
    </div>
    <div class="masthead-stripes" id="masthead-stripes"></div>
  </header>

  <main class="today-main">
    <div class="today-header">
      <h2 id="today-date"></h2>
    </div>
    <div id="today-games" class="today-games"></div>
  </main>

  <footer class="site-footer">
    <p>All kickoff times shown in Pacific Time / Mexico City Time · Weather from Open-Meteo · Results update automatically every few hours</p>
  </footer>

  <script>
const WEATHER_CODES = {
  0: "Clear", 1: "Mostly clear", 2: "Partly cloudy", 3: "Overcast",
  45: "Fog", 48: "Fog", 51: "Light drizzle", 53: "Drizzle", 55: "Drizzle",
  61: "Light rain", 63: "Rain", 65: "Heavy rain", 66: "Freezing rain", 67: "Freezing rain",
  71: "Light snow", 73: "Snow", 75: "Heavy snow", 80: "Showers", 81: "Showers",
  82: "Heavy showers", 95: "Thunderstorms", 96: "Thunderstorms", 99: "Thunderstorms"
};

const TRACKED_ABBR = { USA: "usa", MEX: "mex", GER: "ger" };

function fmtKickoff(iso) {
  const d = new Date(iso);
  const pt = d.toLocaleString("en-US", {
    weekday: "short", month: "short", day: "numeric",
    hour: "numeric", minute: "2-digit",
    timeZone: "America/Los_Angeles"
  });
  const mx = d.toLocaleString("en-US", {
    hour: "numeric", minute: "2-digit",
    timeZone: "America/Mexico_City"
  });
  return `${pt} PT / ${mx} MX`;
}

function todayESPN() {
  // YYYYMMDD in Pacific Time
  return new Date().toLocaleDateString("en-CA", { timeZone: "America/Los_Angeles" }).replace(/-/g, "");
}

async function init() {
  // data.json is the authoritative source for tracked game status and scores.
  // ESPN scoreboard is optional — silently skipped if unavailable or stale.
  const dataRes = await fetch("data.json");
  const data = await dataRes.json();

  // Render masthead
  const order = Object.keys(data.teams).sort((a, b) => (data.teams[a].order || 99) - (data.teams[b].order || 99));
  document.getElementById("masthead-title").innerHTML =
    order.map(k => data.teams[k].name).join(' <span class="x">×</span> ');
  const stripes = document.getElementById("masthead-stripes");
  for (const k of order) {
    const c = data.teams[k].colors;
    for (const color of [c.banner, c.trim]) {
      const s = document.createElement("span");
      s.className = "stripe";
      s.style.background = color;
      stripes.appendChild(s);
    }
  }

  // Date heading
  document.getElementById("today-date").textContent = new Date().toLocaleDateString("en-US", {
    weekday: "long", month: "long", day: "numeric", year: "numeric",
    timeZone: "America/Los_Angeles"
  });

  // Optional: ESPN scoreboard for non-tracked games and live scores
  const espnEventById = {};
  try {
    const espnRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${todayESPN()}`);
    const espn = await espnRes.json();
    for (const ev of (espn.events || [])) espnEventById[ev.id] = ev;
  } catch {
    // ESPN unavailable — tracked games still render correctly from data.json
  }

  // Today's tracked matches from data.json (compare kickoff date in PT)
  const todayPT = new Date().toLocaleDateString("en-CA", { timeZone: "America/Los_Angeles" });
  const todayMatches = data.matches.filter(m =>
    new Date(m.kickoff).toLocaleDateString("en-CA", { timeZone: "America/Los_Angeles" }) === todayPT
  );

  // Non-tracked ESPN events (any WC game today not covered by data.json)
  const trackedIds = new Set(todayMatches.map(m => m.espnId).filter(Boolean));
  const extraEvents = Object.values(espnEventById).filter(ev => !trackedIds.has(ev.id));

  const container = document.getElementById("today-games");
  if (!todayMatches.length && !extraEvents.length) {
    container.innerHTML = `<p class="today-empty">No World Cup matches scheduled today.</p>`;
    return;
  }

  const now = new Date();
  const weatherTargets = [];

  // ── Tracked team matches (from data.json) ──
  for (const m of todayMatches) {
    const espnEvent = m.espnId ? espnEventById[m.espnId] : null;
    const teamData = data.teams[m.team];
    const kickoff = new Date(m.kickoff);

    // data.json result is authoritative for Final; ESPN is a bonus for live status
    const isFinal = m.result != null;
    const espnStatus = espnEvent?.status?.type?.name || "";
    const espnIsLive = espnStatus === "STATUS_IN_PROGRESS" || espnStatus === "STATUS_HALFTIME";
    const isLive = !isFinal && (espnIsLive || kickoff <= now);

    // Resolve display names and scores
    let homeName = teamData.name;
    let awayName = m.opponent;
    let homeScore, awayScore;

    if (espnEvent) {
      const comp = espnEvent.competitions?.[0];
      const competitors = comp?.competitors || [];
      const homeComp = competitors.find(c => c.homeAway === "home") || competitors[0];
      const awayComp = competitors.find(c => c.homeAway === "away") || competitors[1];
      if (homeComp?.team?.displayName) homeName = homeComp.team.displayName;
      if (awayComp?.team?.displayName) awayName = awayComp.team.displayName;

      if (isFinal) {
        const trackedAbbr = { usa: "USA", mex: "MEX", ger: "GER" }[m.team];
        const trackedIsHome = competitors.find(c => c.team?.abbreviation === trackedAbbr)?.homeAway === "home";
        homeScore = trackedIsHome ? m.result.us : m.result.them;
        awayScore = trackedIsHome ? m.result.them : m.result.us;
      } else if (espnIsLive) {
        homeScore = homeComp?.score ?? "–";
        awayScore = awayComp?.score ?? "–";
      }
    } else if (isFinal) {
      homeScore = m.result.us;
      awayScore = m.result.them;
    }

    // Score HTML
    let scoreHtml = "";
    if (isFinal) {
      const note = m.result.note ? ` <span class="score-detail">(${m.result.note})</span>` : "";
      scoreHtml = `<div class="game-score">${homeName} <strong>${homeScore}–${awayScore}</strong> ${awayName}${note} <span class="score-detail">FT</span></div>`;
    } else if (espnIsLive) {
      const detail = espnEvent?.status?.type?.shortDetail || "Live";
      scoreHtml = `<div class="game-score">${homeName} <strong>${homeScore ?? "–"}–${awayScore ?? "–"}</strong> ${awayName} <span class="score-detail">${detail}</span></div>`;
    }

    // TV
    const tvHtml = m.tv
      ? `<div class="game-tv"><span class="ico">📺</span> ${m.tv.english} (Eng) · ${m.tv.spanish} (Esp) · <span class="ico">▶</span> ${m.tv.streaming}</div>`
      : "";

    // Venue
    const venueName = m.venue || espnEvent?.competitions?.[0]?.venue?.fullName || "";
    const venueCity = m.city || "";
    const venueHtml = venueName
      ? `<div class="game-where"><span class="ico">📍</span> ${venueName}${venueCity ? ", " + venueCity : ""}</div>`
      : "";

    // Weather (upcoming tracked matches with coords only)
    let weatherHtml = "";
    if (!isFinal && !isLive && m.lat != null) {
      const wid = `${m.kickoff}|${m.lat}|${m.lon}`;
      weatherHtml = `<div class="game-weather"><span class="weather" data-id="${wid}"><span class="ico">☁</span> Loading forecast…</span></div>`;
      weatherTargets.push(m);
    }

    // watchNotes + links
    const watchNotesHtml = m.watchNotes ? `<p class="watch-notes">${m.watchNotes}</p>` : "";
    const linkItems = isFinal ? (m.articles || []) : (m.previews || []);
    const linksHtml = linkItems.length
      ? `<div class="game-links"><span class="preview-label">${isFinal ? "Reports:" : "Previews:"}</span> ${linkItems.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.title}</a>`).join(" · ")}</div>`
      : "";

    // Stage
    const stage = m.stage || espnEvent?.season?.slug || "";
    const stageHtml = stage ? `<span class="stage-tag">${stage}</span>` : "";

    // Badge
    const badgeClass = isFinal ? "badge-result" : isLive ? "badge-live" : "badge-upcoming";
    const badgeText = isFinal ? "Final" : isLive ? (espnEvent?.status?.type?.shortDetail || "Live") : "Upcoming";

    const card = document.createElement("div");
    card.className = "game-card game-card-tracked";
    card.innerHTML = `
      <div class="game-card-header" style="background:${teamData.colors.banner};border-bottom:4px solid ${teamData.colors.trim}">
        <div class="game-matchup">
          <span class="game-team">${homeName}</span>
          <span class="game-vs">vs</span>
          <span class="game-opp">${awayName}</span>
        </div>
        <div class="game-badge-row">${stageHtml}<span class="badge ${badgeClass}">${badgeText}</span></div>
      </div>
      <div class="game-card-body">
        ${scoreHtml}
        ${!isFinal ? `<div class="game-when"><span class="ico">🕐</span> ${fmtKickoff(m.kickoff)}</div>` : ""}
        ${venueHtml}
        ${tvHtml}
        ${weatherHtml}
        ${watchNotesHtml}
        ${linksHtml}
      </div>`;
    container.appendChild(card);
  }

  // ── Non-tracked games from ESPN (only shown when ESPN is available) ──
  for (const event of extraEvents) {
    const comp = event.competitions?.[0];
    if (!comp) continue;

    const competitors = comp.competitors || [];
    const home = competitors.find(c => c.homeAway === "home") || competitors[0];
    const away = competitors.find(c => c.homeAway === "away") || competitors[1];

    const statusName = event.status?.type?.name || "";
    const isFinal = statusName === "STATUS_FINAL";
    const isLive = statusName === "STATUS_IN_PROGRESS" || statusName === "STATUS_HALFTIME";
    const kickoffISO = event.date;

    let scoreHtml = "";
    if (isFinal || isLive) {
      const homeScore = home?.score ?? "–";
      const awayScore = away?.score ?? "–";
      const detail = event.status?.type?.shortDetail || (isFinal ? "FT" : "Live");
      scoreHtml = `<div class="game-score">${home?.team?.displayName || "?"} <strong>${homeScore}–${awayScore}</strong> ${away?.team?.displayName || "?"} <span class="score-detail">${detail}</span></div>`;
    }

    const venueName = comp.venue?.fullName || "";
    const venueCity = [comp.venue?.address?.city, comp.venue?.address?.state].filter(Boolean).join(", ");
    const venueHtml = venueName
      ? `<div class="game-where"><span class="ico">📍</span> ${venueName}${venueCity ? ", " + venueCity : ""}</div>` : "";

    const broadcastNames = (comp.broadcasts || []).flatMap(b => b.names || []).join(", ");
    const tvHtml = broadcastNames ? `<div class="game-tv"><span class="ico">📺</span> ${broadcastNames}</div>` : "";

    const stage = event.season?.slug || "";
    const stageHtml = stage ? `<span class="stage-tag">${stage}</span>` : "";

    const badgeClass = isFinal ? "badge-result" : isLive ? "badge-live" : "badge-upcoming";
    const badgeText = isFinal ? "Final" : isLive ? (event.status?.type?.shortDetail || "Live") : "Upcoming";

    const card = document.createElement("div");
    card.className = "game-card";
    card.innerHTML = `
      <div class="game-card-header" style="background:#1A1A1A;border-bottom:4px solid #555">
        <div class="game-matchup">
          <span class="game-team">${home?.team?.displayName || "?"}</span>
          <span class="game-vs">vs</span>
          <span class="game-opp">${away?.team?.displayName || "?"}</span>
        </div>
        <div class="game-badge-row">${stageHtml}<span class="badge ${badgeClass}">${badgeText}</span></div>
      </div>
      <div class="game-card-body">
        ${scoreHtml}
        ${!isFinal ? `<div class="game-when"><span class="ico">🕐</span> ${fmtKickoff(kickoffISO)}</div>` : ""}
        ${venueHtml}
        ${tvHtml}
      </div>`;
    container.appendChild(card);
  }

  fetchWeather(weatherTargets);
}

async function fetchWeather(matches) {
  for (const m of matches) {
    const el = document.querySelector(`.weather[data-id="${m.kickoff}|${m.lat}|${m.lon}"]`);
    if (!el) continue;
    const kickoff = new Date(m.kickoff);
    if ((kickoff - new Date()) / 86400000 > 15) {
      el.innerHTML = `<span class="ico">☁</span> Forecast available closer to kickoff`;
      continue;
    }
    try {
      const dateStr = m.kickoff.slice(0, 10);
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${m.lat}&longitude=${m.lon}` +
        `&hourly=temperature_2m,weather_code,precipitation_probability` +
        `&temperature_unit=fahrenheit&timezone=auto&start_date=${dateStr}&end_date=${dateStr}`;
      const resp = await fetch(url);
      const w = await resp.json();
      const hourLocal = new Date(kickoff.toLocaleString("en-US", { timeZone: w.timezone })).getHours();
      const i = Math.min(hourLocal, w.hourly.time.length - 1);
      const temp = Math.round(w.hourly.temperature_2m[i]);
      const cond = WEATHER_CODES[w.hourly.weather_code[i]] || "—";
      const rain = w.hourly.precipitation_probability?.[i];
      el.innerHTML = `<span class="ico">☁</span> ${temp}°F, ${cond}` + (rain != null ? ` · ${rain}% rain` : "");
    } catch {
      el.innerHTML = `<span class="ico">☁</span> Forecast unavailable`;
    }
  }
}

init();
  </script>
</body>
</html>
